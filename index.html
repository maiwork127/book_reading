<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>読書ログ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #F7F2EB;
    font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif;
    color: #2C1F14;
    min-height: 100vh;
    padding-bottom: 60px;
  }
  .container { max-width: 680px; margin: 0 auto; padding: 0 16px; }

  /* Header */
  .header { display: flex; justify-content: space-between; align-items: flex-end; padding: 32px 0 20px; }
  .app-title { font-size: 26px; font-weight: 900; letter-spacing: -0.02em; }
  .app-sub { font-size: 13px; color: #9C8878; margin-top: 4px; }
  .add-btn {
    background: #3D2B1F; color: #FFF8F0; border: none; border-radius: 10px;
    padding: 10px 20px; font-size: 14px; font-weight: 700; cursor: pointer;
    font-family: inherit;
  }

  /* Search */
  .search-input {
    width: 100%; padding: 12px 16px; border-radius: 12px;
    border: 1.5px solid #E5DDD3; background: #FDFAF6;
    font-size: 14px; color: #2C1F14; outline: none; margin-bottom: 14px;
    font-family: inherit;
  }

  /* Filter chips */
  .filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px; }
  .chip {
    padding: 5px 12px; border-radius: 20px; font-size: 12px; cursor: pointer;
    border: 1.5px solid #E5DDD3; background: #FAFAF8; color: #888;
    font-family: inherit; transition: all 0.15s;
  }
  .chip.all-active { background: #3D2B1F; color: #FFF8F0; border-color: #3D2B1F; font-weight: 700; }

  /* Cards */
  .cards { display: flex; flex-direction: column; gap: 14px; }
  .card {
    background: #FDFAF6; border-radius: 16px; padding: 18px 20px;
    border: 1.5px solid #EDE5D8; cursor: pointer;
    box-shadow: 0 2px 8px rgba(60,40,20,0.06);
    transition: box-shadow 0.15s;
  }
  .card:hover { box-shadow: 0 4px 16px rgba(60,40,20,0.12); }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .card-date { font-size: 11px; color: #B0A090; margin-bottom: 2px; }
  .card-title { font-size: 16px; font-weight: 800; color: #2C1F14; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-author { font-size: 12px; color: #9C8878; margin-bottom: 8px; }
  .card-quote {
    font-size: 13px; color: #5C4A3A; line-height: 1.7; margin-top: 10px;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
  }

  /* Tags */
  .tags { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 10px; }
  .tag {
    border-radius: 20px; padding: 3px 11px; font-size: 12px; font-weight: 600;
    border: 1px solid; white-space: nowrap;
  }
  .tag-sm { padding: 2px 8px; font-size: 11px; }

  /* Stars */
  .stars { display: flex; gap: 3px; }
  .star { font-size: 13px; color: #E0D6C8; }
  .star.on { color: #F4A62A; }
  .star-lg { font-size: 22px; cursor: pointer; transition: color 0.1s; user-select: none; }

  /* Empty */
  .empty { text-align: center; padding: 60px 0; }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-msg { color: #B0A090; font-weight: 600; }
  .empty-sub { color: #C8BAA8; font-size: 13px; margin-top: 4px; }

  /* ── VIEWS (hidden/shown) ── */
  .view { display: none; }
  .view.active { display: block; }

  /* Detail */
  .back-btn {
    background: none; border: none; color: #9C8878; font-size: 14px;
    cursor: pointer; padding: 24px 0 8px; display: block; font-family: inherit;
  }
  .detail-card {
    background: #FDFAF6; border-radius: 20px; padding: 24px;
    border: 1.5px solid #EDE5D8; margin-top: 8px;
  }
  .detail-top { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 8px; }
  .detail-date { font-size: 12px; color: #B0A090; margin-bottom: 4px; }
  .detail-title { font-size: 22px; font-weight: 900; color: #2C1F14; margin-bottom: 4px; }
  .detail-author { font-size: 13px; color: #9C8878; margin-bottom: 8px; }
  .detail-actions { display: flex; gap: 8px; }
  .edit-btn {
    background: #F0EAE0; border: none; border-radius: 8px; padding: 7px 14px;
    font-size: 13px; font-weight: 600; cursor: pointer; color: #5C4A3A; font-family: inherit;
  }
  .delete-btn {
    background: #FEF0F0; border: none; border-radius: 8px; padding: 7px 14px;
    font-size: 13px; font-weight: 600; cursor: pointer; color: #C0392B; font-family: inherit;
  }
  .quote-box {
    position: relative; background: #F7F0E6; border-radius: 12px;
    padding: 20px 20px 16px 28px; margin-top: 20px;
    border-left: 4px solid #C8A882;
  }
  .quote-mark {
    position: absolute; top: 8px; left: 10px; font-size: 32px;
    color: #C8A882; line-height: 1; font-family: Georgia, serif;
  }
  .quote-text { font-size: 15px; color: #3D2B1F; line-height: 1.85; font-style: italic; }
  .feeling-box {
    background: #FAFAF8; border-radius: 12px; padding: 14px 16px;
    margin-top: 14px; border: 1.5px solid #EDE5D8;
  }
  .feeling-label { font-size: 12px; font-weight: 700; color: #9C8878; margin-bottom: 6px; }
  .feeling-text { font-size: 14px; color: #3D2B1F; line-height: 1.8; }

  /* Form */
  .form-title { font-size: 20px; font-weight: 900; margin: 0 0 20px; }
  .form { display: flex; flex-direction: column; gap: 6px; padding-bottom: 40px; }
  .label { font-size: 13px; font-weight: 700; color: #5C4A3A; margin-top: 10px; }
  .req { color: #C0392B; }
  .input, .textarea {
    width: 100%; padding: 11px 14px; border-radius: 10px;
    border: 1.5px solid #E5DDD3; background: #FDFAF6;
    font-size: 14px; color: #2C1F14; outline: none;
    font-family: inherit;
  }
  .textarea { min-height: 90px; resize: vertical; }
  .tag-toggles { display: flex; gap: 8px; flex-wrap: wrap; }
  .tag-toggle {
    padding: 6px 13px; border-radius: 20px; font-size: 12px; cursor: pointer;
    border: 1.5px solid #E5DDD3; background: #FAFAF8; color: #888;
    font-family: inherit; transition: all 0.15s;
  }
  .save-btn {
    margin-top: 24px; background: #3D2B1F; color: #FFF8F0; border: none;
    border-radius: 12px; padding: 14px; font-size: 15px; font-weight: 800;
    cursor: pointer; font-family: inherit; letter-spacing: 0.03em;
    transition: opacity 0.15s;
  }
  .save-btn:disabled { opacity: 0.4; cursor: default; }
</style>
</head>
<body>
<div class="container">

  <!-- LIST VIEW -->
  <div id="view-list" class="view active">
    <div class="header">
      <div>
        <div class="app-title">📚 読書ログ</div>
        <div class="app-sub" id="count-label">0冊の記録</div>
      </div>
      <button class="add-btn" onclick="openAdd()">＋ 追加</button>
    </div>
    <input class="search-input" placeholder="🔍  タイトル・著者・内容で検索…" oninput="renderList()" id="search-input">
    <div class="filter-row" id="filter-row"></div>
    <div class="cards" id="cards"></div>
  </div>

  <!-- DETAIL VIEW -->
  <div id="view-detail" class="view">
    <button class="back-btn" onclick="showView('list')">← 一覧に戻る</button>
    <div class="detail-card" id="detail-content"></div>
  </div>

  <!-- ADD/EDIT VIEW -->
  <div id="view-add" class="view">
    <button class="back-btn" onclick="cancelAdd()">← キャンセル</button>
    <h2 class="form-title" id="form-title">読書ログを追加</h2>
    <div class="form">
      <div class="label">本のタイトル <span class="req">*</span></div>
      <input class="input" id="f-title" placeholder="例：思考の整理学" oninput="checkSave()">
      <div class="label">著者</div>
      <input class="input" id="f-author" placeholder="例：外山 滋比古">
      <div class="label">印象に残ったフレーズ・言葉 <span class="req">*</span></div>
      <textarea class="textarea" id="f-quote" placeholder="引用や印象に残ったフレーズをメモ…" oninput="checkSave()"></textarea>
      <div class="label">感じたこと・活かしたいこと</div>
      <textarea class="textarea" id="f-feeling" placeholder="読んでどう思った？仕事や生活にどう使えそう？" style="min-height:80px"></textarea>
      <div class="label">タグ</div>
      <div class="tag-toggles" id="tag-toggles"></div>
      <div class="label">評価</div>
      <div class="stars" id="star-input"></div>
      <button class="save-btn" id="save-btn" onclick="saveLog()" disabled>保存する</button>
    </div>
  </div>

</div>

<script>
const TAGS = ["いい言葉","仕事に使える","人生観","気づき","感動","また読みたい"];
const TAG_COLORS = {
  "いい言葉":    { bg:"#FFF3E0", text:"#E65100", border:"#FFCC80" },
  "仕事に使える":{ bg:"#E3F2FD", text:"#0D47A1", border:"#90CAF9" },
  "人生観":      { bg:"#F3E5F5", text:"#4A148C", border:"#CE93D8" },
  "気づき":      { bg:"#E8F5E9", text:"#1B5E20", border:"#A5D6A7" },
  "感動":        { bg:"#FCE4EC", text:"#880E4F", border:"#F48FB1" },
  "また読みたい":{ bg:"#FFFDE7", text:"#F57F17", border:"#FFF176" },
};

let logs = [];
let filterTag = null;
let editId = null;
let formRating = 0;
let formTags = [];

// ── Storage ──
function save() { try { localStorage.setItem("reading_logs", JSON.stringify(logs)); } catch(e){} }
function load() { try { logs = JSON.parse(localStorage.getItem("reading_logs") || "[]"); } catch(e){ logs=[]; } }

// ── View switching ──
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  window.scrollTo(0, 0);
}

// ── Tag badge HTML ──
function tagBadge(tag, sm) {
  const c = TAG_COLORS[tag] || {bg:"#F5F5F5",text:"#555",border:"#DDD"};
  return `<span class="tag${sm?' tag-sm':''}" style="background:${c.bg};color:${c.text};border-color:${c.border}">${tag}</span>`;
}

// ── Stars HTML ──
function starsHtml(val, size) {
  return [1,2,3,4,5].map(n =>
    `<span class="star${n<=val?' on':''}${size?' star-lg':''}"${size?` onclick="setRating(${n})"`:''}>★</span>`
  ).join('');
}

// ── Render list ──
function renderList() {
  const q = (document.getElementById('search-input').value||'').toLowerCase();
  const filtered = logs.filter(l => {
    const ms = !q || l.title.toLowerCase().includes(q) || (l.author||'').toLowerCase().includes(q) || l.quote.toLowerCase().includes(q) || l.feeling.toLowerCase().includes(q);
    const mt = !filterTag || l.tags.includes(filterTag);
    return ms && mt;
  });

  document.getElementById('count-label').textContent = logs.length + '冊の記録';

  // filter chips
  const fr = document.getElementById('filter-row');
  fr.innerHTML = `<button class="chip${!filterTag?' all-active':''}" onclick="setFilter(null)">すべて</button>` +
    TAGS.map(t => {
      const c = TAG_COLORS[t];
      const active = filterTag === t;
      return `<button class="chip" onclick="setFilter('${t}')" style="${active?`background:${c.bg};color:${c.text};border-color:${c.border};font-weight:700`:''}">` + t + `</button>`;
    }).join('');

  const container = document.getElementById('cards');
  if (filtered.length === 0) {
    container.innerHTML = logs.length === 0
      ? `<div class="empty"><div class="empty-icon">📖</div><div class="empty-msg">まだ記録がありません</div><div class="empty-sub">「＋ 追加」から最初の読書ログを作りましょう</div></div>`
      : `<div class="empty"><div class="empty-icon">🔍</div><div class="empty-msg">該当する記録が見つかりません</div></div>`;
    return;
  }

  container.innerHTML = filtered.map(l => `
    <div class="card" onclick="openDetail(${l.id})">
      <div class="card-top">
        <div style="flex:1;min-width:0">
          <div class="card-date">${l.date}</div>
          <div class="card-title">${esc(l.title)}</div>
          ${l.author ? `<div class="card-author">${esc(l.author)}</div>` : ''}
        </div>
        ${l.rating > 0 ? `<div class="stars">${starsHtml(l.rating,false)}</div>` : ''}
      </div>
      <div class="card-quote">"${esc(l.quote)}"</div>
      ${l.tags.length ? `<div class="tags">${l.tags.map(t=>tagBadge(t,true)).join('')}</div>` : ''}
    </div>
  `).join('');
}

function setFilter(tag) { filterTag = tag; renderList(); }

// ── Detail ──
function openDetail(id) {
  const l = logs.find(x => x.id === id);
  if (!l) return;
  document.getElementById('detail-content').innerHTML = `
    <div class="detail-top">
      <div>
        <div class="detail-date">${l.date}</div>
        <div class="detail-title">${esc(l.title)}</div>
        ${l.author ? `<div class="detail-author">${esc(l.author)}</div>` : ''}
        ${l.rating > 0 ? `<div class="stars">${starsHtml(l.rating,false)}</div>` : ''}
      </div>
      <div class="detail-actions">
        <button class="edit-btn" onclick="openEdit(${l.id})">編集</button>
        <button class="delete-btn" onclick="deleteLog(${l.id})">削除</button>
      </div>
    </div>
    <div class="quote-box">
      <span class="quote-mark">"</span>
      <p class="quote-text">${esc(l.quote)}</p>
    </div>
    ${l.feeling ? `<div class="feeling-box"><div class="feeling-label">📝 感じたこと・メモ</div><p class="feeling-text">${esc(l.feeling)}</p></div>` : ''}
    ${l.tags.length ? `<div class="tags" style="margin-top:16px">${l.tags.map(t=>tagBadge(t,false)).join('')}</div>` : ''}
  `;
  showView('detail');
}

function deleteLog(id) {
  if (!confirm('この記録を削除しますか？')) return;
  logs = logs.filter(l => l.id !== id);
  save(); renderList(); showView('list');
}

// ── Add / Edit ──
function openAdd() {
  editId = null; formRating = 0; formTags = [];
  document.getElementById('form-title').textContent = '読書ログを追加';
  document.getElementById('f-title').value = '';
  document.getElementById('f-author').value = '';
  document.getElementById('f-quote').value = '';
  document.getElementById('f-feeling').value = '';
  document.getElementById('save-btn').textContent = '保存する';
  renderTagToggles(); renderStarInput(); checkSave();
  showView('add');
}

function openEdit(id) {
  const l = logs.find(x => x.id === id);
  if (!l) return;
  editId = id; formRating = l.rating || 0; formTags = [...l.tags];
  document.getElementById('form-title').textContent = 'ログを編集';
  document.getElementById('f-title').value = l.title;
  document.getElementById('f-author').value = l.author || '';
  document.getElementById('f-quote').value = l.quote;
  document.getElementById('f-feeling').value = l.feeling || '';
  document.getElementById('save-btn').textContent = '更新する';
  renderTagToggles(); renderStarInput(); checkSave();
  showView('add');
}

function cancelAdd() { editId = null; renderList(); showView('list'); }

function renderTagToggles() {
  document.getElementById('tag-toggles').innerHTML = TAGS.map(t => {
    const c = TAG_COLORS[t];
    const on = formTags.includes(t);
    return `<button class="tag-toggle" onclick="toggleTag('${t}')" style="${on?`background:${c.bg};color:${c.text};border-color:${c.border};font-weight:700`:''}">${t}</button>`;
  }).join('');
}

function toggleTag(tag) {
  formTags = formTags.includes(tag) ? formTags.filter(t=>t!==tag) : [...formTags, tag];
  renderTagToggles();
}

function renderStarInput() {
  document.getElementById('star-input').innerHTML = starsHtml(formRating, true);
}

function setRating(n) { formRating = n; renderStarInput(); }

function checkSave() {
  const ok = document.getElementById('f-title').value.trim() && document.getElementById('f-quote').value.trim();
  document.getElementById('save-btn').disabled = !ok;
}

function saveLog() {
  const title = document.getElementById('f-title').value.trim();
  const quote = document.getElementById('f-quote').value.trim();
  if (!title || !quote) return;
  const entry = {
    title, quote,
    author: document.getElementById('f-author').value.trim(),
    feeling: document.getElementById('f-feeling').value.trim(),
    tags: [...formTags],
    rating: formRating,
  };
  if (editId !== null) {
    logs = logs.map(l => l.id === editId ? { ...entry, id: editId, date: l.date } : l);
    editId = null;
  } else {
    entry.id = Date.now();
    entry.date = new Date().toLocaleDateString('ja-JP');
    logs = [entry, ...logs];
  }
  save(); renderList(); showView('list');
}

// ── Utils ──
function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/\n/g,'<br>');
}

// ── Init ──
load(); renderList();
</script>
</body>
</html>
